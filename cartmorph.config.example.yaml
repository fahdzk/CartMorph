# cartmorph.config.example.yaml
# -----------------------------------------------------------
# CartMorph API Configuration — EXAMPLE / TEMPLATE
# DO NOT edit this file for real credentials.
# Copy this file to cartmorph.config.yaml and fill in your keys.
# cartmorph.config.yaml is gitignored and never committed.
# -----------------------------------------------------------

stores:
  kroger:
    enabled: true
    client_id: "YOUR_KROGER_CLIENT_ID"
    client_secret: "YOUR_KROGER_CLIENT_SECRET"
    redirect_uri: "http://localhost:3000/auth/kroger/callback"
    scopes:
      - "product.compact"
      - "cart.basic:write"
    base_url: "https://api.kroger.com/v1"
    auth_url: "https://api.kroger.com/v1/connect/oauth2/token"
    portal_url: "https://developer.kroger.com"

  walmart:
    enabled: true
    client_id: "YOUR_WALMART_CLIENT_ID"
    client_secret: "YOUR_WALMART_CLIENT_SECRET"
    base_url: "https://marketplace.walmartapis.com/v3"
    auth_url: "https://marketplace.walmartapis.com/v3/token"
    portal_url: "https://developer.walmart.com"

  instacart:
    enabled: true
    api_key: "YOUR_INSTACART_API_KEY"
    base_url: "https://connect.instacart.com"
    dev_base_url: "https://connect.dev.instacart.tools"
    portal_url: "https://docs.instacart.com/developer_platform_api"

  target:
    enabled: false
    base_url: "https://redsky.target.com"
    notes: >
      Target does not offer an official public developer API.
      RedSky is an internal distribution API that Target has left partially
      accessible. Use responsibly and respect rate limits. No key required
      for public product endpoints.

# Custom stores — see CONTRIBUTING.md for details
custom_stores: []
